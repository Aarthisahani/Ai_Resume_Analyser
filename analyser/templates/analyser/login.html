<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Resume Analyser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border: none;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .title {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 2rem;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            color: white;
        }
        label { font-weight: 600; color: #444; }
        .signup-link { color: #667eea; font-weight: 600; text-decoration: none; }
        .signup-link:hover { color: #764ba2; }
        .error { color: #e74c3c; font-size: 13px; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="text-center mb-4">
                    <h1 class="title"><i class="fas fa-robot me-2"></i>Resume AI</h1>
                    <p class="text-muted">Login to analyse your resume</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger border-0 rounded-3">
                    <i class="fas fa-exclamation-circle me-2"></i>Invalid username or password!
                </div>
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control mt-1" placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control mt-1" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>

                <p class="text-center mt-4 mb-0 text-muted">
                    Don't have an account?
                    <a href="/signup/" class="signup-link">Sign up free</a>
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
